<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoff Rod</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --navy: #1a2332;
            --charcoal: #2d3748;
            --slate: #64748b;
            --warm-accent: #d97706;
            --soft-white: #f8fafc;
        }
        
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--navy);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        /* Subtle background texture */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(217, 119, 6, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(26, 35, 50, 0.02) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .container {
            max-width: 640px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .name {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        
        .tagline {
            font-size: clamp(1.125rem, 2.5vw, 1.375rem);
            color: var(--slate);
            font-weight: 400;
            margin-bottom: 3rem;
            letter-spacing: 0.01em;
        }
        
        .divider {
            width: 60px;
            height: 2px;
            background: var(--warm-accent);
            margin: 2rem auto;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.3s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .message {
            font-size: 1.0625rem;
            color: var(--charcoal);
            line-height: 1.7;
            margin-bottom: 3rem;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.5s forwards;
        }
        
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.7s forwards;
        }
        
        .link-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            background: var(--navy);
            color: var(--soft-white);
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9375rem;
            letter-spacing: 0.01em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(26, 35, 50, 0.12);
        }
        
        .link-button:hover {
            background: var(--charcoal);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 35, 50, 0.18);
        }
        
        .link-button.secondary {
            background: var(--soft-white);
            color: var(--navy);
            border: 1.5px solid var(--navy);
        }
        
        .link-button.secondary:hover {
            background: var(--navy);
            color: var(--soft-white);
        }
        
        /* Icon styles */
        .icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        
        @media (max-width: 640px) {
            .name {
                font-size: 2.5rem;
            }
            
            .tagline {
                font-size: 1.125rem;
            }
            
            .message {
                font-size: 1rem;
            }
            
            .links {
                flex-direction: column;
                align-items: stretch;
            }
            
            .link-button {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="name">Geoff Rod</h1>
        <p class="tagline">Engineering Director | Solutions Architect</p>
        
        <div class="divider"></div>
        
        <p class="message">
            This site is currently under development. In the meantime, feel free to connect on LinkedIn or reach out directly.
        </p>
        
        <div class="links">
            <a href="https://www.linkedin.com/in/geoffrod/" class="link-button" target="_blank" rel="noopener">
                <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
                LinkedIn
            </a>
            
            <a href="mailto:geoff@geoffrod.com" class="link-button secondary">
                <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                </svg>
                Email
            </a>
        </div>
    </div>
</body>
</html>
